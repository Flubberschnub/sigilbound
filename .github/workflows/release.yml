name: Tagged APK Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager_status=${PIPESTATUS[1]}
          set -o pipefail
          exit "$sdkmanager_status"

      - name: Install Android API and build tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'
          cache-provider: basic

      - name: Build installable debug-signed APK
        run: |
          gradle --no-daemon lintDebug assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk "Sigilbound-${GITHUB_REF_NAME}.apk"
          sha256sum "Sigilbound-${GITHUB_REF_NAME}.apk" > "Sigilbound-${GITHUB_REF_NAME}.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "Sigilbound-${GITHUB_REF_NAME}.apk" "Sigilbound-${GITHUB_REF_NAME}.sha256" --generate-notes
