name: Materialize v1.4 source

on:
  push:
    branches: [feature/v1.4-arcane-architecture]
    paths:
      - '.v14-payload/**'
      - '.github/workflows/materialize-v14.yml'
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: materialize-v14
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event_name == 'push' || github.head_ref == 'feature/v1.4-arcane-architecture'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/v1.4-arcane-architecture
          fetch-depth: 0

      - name: Verify and expand reviewed source
        shell: bash
        run: |
          set -euo pipefail
          cat .v14-payload/part-* > /tmp/v14.b64
          echo 'b65ba9ad9b53da7e06d79e0939f9dbdc6151243cd5f19fa086e1a124bde1f253  /tmp/v14.b64' | sha256sum --check --strict
          base64 --decode /tmp/v14.b64 > /tmp/v14.tar.gz
          echo 'dca3e900346d7de6e50bf202f748980b4b1b93803ad91956c16cda7f61f553ec  /tmp/v14.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/v14.tar.gz
          rm -rf .v14-payload .github/workflows/materialize-v14.yml
          git diff --check

      - name: Commit clean v1.4 source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Sigilbound Builder'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat: expand spell architecture and overhaul mobile UX'
          git push origin HEAD:feature/v1.4-arcane-architecture
